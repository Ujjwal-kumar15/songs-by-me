<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Playlist</title>
    <!-- Modern Typography: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Abstract Background Animation -->
    <div class="background-animation">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        <div class="blob shape3"></div>
    </div>

    <div class="container">
        <!-- Player Section -->
        <div class="player-card">
            <div class="album-art">
                <img id="coverImage" src="" alt="Album Art">
            </div>
            
            <div class="playing-status" id="playingStatus">
                <i class="fas fa-volume-up"></i>
            </div>
            
            <div class="song-info">
                <h1 id="songTitle">Song Title</h1>
                <p id="songArtist">Artist Name</p>
                <p id="songDescription" class="song-description"></p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrapper">
                <div class="time-container">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress" id="progress"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="action-btn" id="prev" title="Previous">
                    <i class="fas fa-backward"></i>
                </button>
                <button class="action-btn action-btn-big" id="play" title="Play">
                    <i class="fas fa-play"></i>
                </button>
                <button class="action-btn" id="next" title="Next">
                    <i class="fas fa-forward"></i>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-container">
                <i class="fas fa-volume-up" id="volumeIcon" title="Mute/Unmute"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" title="Volume">
            </div>
            
            <!-- Hidden Audio Element -->
            <audio id="audio"></audio>
        </div>

        <!-- Playlist Section -->
        <div class="playlist-card">
            <h2>My Playlist</h2>
            <ul id="playlist" class="playlist-list">
                <!-- Playlist Items will be dynamically inserted here -->
            </ul>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
