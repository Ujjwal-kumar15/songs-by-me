<!DOCTYPE html>
<html>
  <head>
    <title>Songs by me</title>

    <style>

      body{
        text-align:centre;
        font-family:Arial;
        background:#111;
        color:white;
      }
      #cover{
        width:220px;
        height:220px;
        border-radius:50%;
        margin-top:40px;
      }
      /* rotation animation */
      @keyframes spin{
        from{transform:rotate(0deg);}
        to{transform:rotate(360deg);}
      }
      .rotate{
        animation:spin 4s linear infinite;
      }
    </style>
  </head>
  
  <body>
    
    <h2>Chale Uthe</h2>
    <img id="cover" src="cover.jpg">
    <br><br>
    
    
    <audio id="aduio" controls>
      <source src="chale-uthe.mp3" type="audio/mpeg">
    </audio>
    <script>
      var audio=document.getElementById("aduio");
      var cover=document.getElementById("cover");

      audio.addEventListener("play",function(){
        cover.classList.add("rotate");
      });
      audio.addEventListener("pause",function(){
        cover.classList.remove("rotate");
      });
    </script>
    
  </body>
</html>
